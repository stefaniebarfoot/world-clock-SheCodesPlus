<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>

    <title>World Clock Project</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clocks</h1>
      <select name="">
        <option value="">Select a city...</option>
        <option value="">Edinburgh</option>
        <option value="">Auckland</option>
        <option value="">Tokyo</option>
        <option value="">Atlanta</option>
      </select>

      <div class="city" id="los-angeles">
        <div>
          <h2>Los Angeles</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>

      <div class="city" id="paris">
        <div>
          <h2>Paris</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>
    </div>
    <footer>
      This project was coded by Stefanie Barfoot and is
      <a
        href="https://github.com/stefaniebarfoot/world-clock-SheCodesPlus"
        target="blank"
      >
        open-sourced on GitHub</a
      >
    </footer>

    <script src="javascript/index.js"></script>
  </body>
</html>
